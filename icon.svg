<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" stroke="rgba(255,255,255,0.2)" stroke-width="12" filter="url(#shadow)"/>
  
  <!-- 字母 W -->
  <text x="256" y="355" font-family="Arial, sans-serif" font-size="280" font-weight="900" fill="white" text-anchor="middle" style="text-shadow: 0 4px 10px rgba(0,0,0,0.2)">W</text>
  
  <!-- 旋转的星星 (带有旋转动画代码) -->
  <g transform="translate(410, 110)">
    <path d="M0,-40 L11,-15 L38,-11 L19,8 L24,35 L0,22 L-24,35 L-19,8 L-38,-11 L-11,-15 Z" fill="#fbbf24" stroke="none">
      <!-- 这里是控制旋转动画的关键代码 -->
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 0 0" 
        to="360 0 0" 
        dur="4s" 
        repeatCount="indefinite" />
    </path>
  </g>
</svg>
